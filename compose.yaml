services:
  signet:
    image: hostr-signet:latest
    build:
      context: https://github.com/Letdown2491/signet.git#7c79aa0f334f661c709705435179b1ac9c2116d5
      dockerfile_inline: |
        FROM node:20-slim AS build

        WORKDIR /app

        ARG PNPM_VERSION=10.14.0
        RUN corepack enable && corepack prepare pnpm@$${PNPM_VERSION} --activate

        COPY pnpm-lock.yaml pnpm-workspace.yaml package.json ./
        COPY apps/signet/package.json ./apps/signet/
        COPY packages/signet-types ./packages/signet-types

        ENV CI=true
        RUN pnpm install --frozen-lockfile

        COPY apps/signet ./apps/signet

        WORKDIR /app/apps/signet
        ENV DATABASE_URL="file:/app/config/signet.db"
        RUN pnpm prisma generate
        RUN pnpm build

        FROM node:20-slim AS runtime

        WORKDIR /app

        ARG PNPM_VERSION=10.14.0
        RUN apt-get update && apt-get install -y --no-install-recommends openssl wget ca-certificates && rm -rf /var/lib/apt/lists/*

        COPY --from=build /app/node_modules ./node_modules
        COPY --from=build /app/package.json ./
        COPY --from=build /app/pnpm-workspace.yaml ./
        COPY --from=build /app/packages/signet-types ./packages/signet-types

        COPY --from=build /app/apps/signet/node_modules ./apps/signet/node_modules
        COPY --from=build /app/apps/signet/package.json ./apps/signet/
        COPY --from=build /app/apps/signet/dist ./apps/signet/dist
        COPY --from=build /app/apps/signet/prisma ./apps/signet/prisma
        COPY --from=build /app/apps/signet/prisma.config.ts ./apps/signet/prisma.config.ts
        COPY --from=build /app/apps/signet/entrypoint.sh ./apps/signet/entrypoint.sh

        RUN chmod +x ./apps/signet/entrypoint.sh
        RUN corepack enable && corepack prepare pnpm@$${PNPM_VERSION} --activate

        WORKDIR /app/apps/signet

        ENV DATABASE_URL="file:/app/config/signet.db"
        ENV SIGNET_PORT=3000
        ENV SIGNET_HOST=0.0.0.0

        EXPOSE 3000

        ENTRYPOINT ["./entrypoint.sh"]
        CMD ["start", "--config", "/app/config/signet.json"]
    environment:
      DATABASE_URL: file:/app/config/signet.db
      EXTERNAL_URL: http://127.0.0.1:13047
      SIGNET_DISABLE_RATE_LIMIT: "1"
    extra_hosts:
      - host.docker.internal:host-gateway
    entrypoint:
      - sh
      - -lc
    command:
      - >
        set -eu;
        mkdir -p /app/config;
        if [ ! -f /app/config/signet.json ]; then
          cp /seed/signet.local.json /app/config/signet.json;
        fi;
        if [ "$${SIGNET_DISABLE_RATE_LIMIT:-}" = "1" ]; then
          node /seed/disable-rate-limit.mjs;
        fi;
        exec ./entrypoint.sh start --config /app/config/signet.json
    volumes:
      - ./data/signet:/app/config
      - ./docker/signet/signet.local.json:/seed/signet.local.json:ro
      - ./docker/signet/disable-rate-limit.mjs:/seed/disable-rate-limit.mjs:ro
    ports:
      - "127.0.0.1:13046:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 180s
    restart: unless-stopped

  signet-ui:
    image: hostr-signet-ui:latest
    build:
      context: https://github.com/Letdown2491/signet.git#7c79aa0f334f661c709705435179b1ac9c2116d5
      dockerfile_inline: |
        FROM node:20-slim AS build
        WORKDIR /app
        ARG PNPM_VERSION=10.14.0
        RUN corepack enable && corepack prepare pnpm@$${PNPM_VERSION} --activate
        COPY pnpm-lock.yaml pnpm-workspace.yaml package.json ./
        COPY apps/signet-ui/package.json ./apps/signet-ui/
        COPY packages/signet-types ./packages/signet-types
        RUN pnpm install --frozen-lockfile
        COPY apps/signet-ui ./apps/signet-ui
        WORKDIR /app/apps/signet-ui
        RUN pnpm build

        FROM node:20-slim AS runtime
        WORKDIR /app
        ENV NODE_ENV=production
        COPY --from=build /app/apps/signet-ui/dist ./dist
        COPY --from=build /app/apps/signet-ui/server.mjs ./server.mjs
        RUN npm install --no-save express@4 http-proxy-middleware@3

        ENV UI_PORT=4174
        ENV UI_HOST=0.0.0.0
        ENV DAEMON_URL=http://signet:3000

        EXPOSE 4174
        CMD ["node", "server.mjs"]
    depends_on:
      signet:
        condition: service_healthy
    environment:
      UI_HOST: 0.0.0.0
      DAEMON_URL: http://signet:3000
    ports:
      - "127.0.0.1:13047:4174"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4174', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  blossom:
    image: ghcr.io/hzrd149/blossom-server:6.1.5
    platform: linux/amd64
    restart: unless-stopped
    environment:
      - BLOSSOM_PUBLIC_DOMAIN=blossom.marketplace.test
      - BLOSSOM_DASHBOARD_PASSWORD=${BLOSSOM_DASHBOARD_PASSWORD:-nmdk}
      - TMPDIR=/app/data
    ports:
      - "127.0.0.1:${MARKETPLACE_BLOSSOM_PORT:-13096}:3000"
    volumes:
      - ./docker/blossom.yaml:/app/config.yml:ro
      - ./data/blossom:/app/data
    healthcheck:
      test: ["CMD-SHELL", "bash -lc ':</dev/tcp/127.0.0.1/3000'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
