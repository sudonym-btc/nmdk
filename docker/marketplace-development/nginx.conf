      }
      proxy_pass http://boltz-backend-nginx:9001;
    }
  }

  server {
    listen 80;
    listen 443 ssl;
    server_name boltz.backend.evm.marketplace.test;

    location / {
      proxy_pass http://boltz-backend:9000;
    }
  }

  server {
    listen 80;
    listen 443 ssl;
    server_name bitcoin.evm.marketplace.test;

    location / {
