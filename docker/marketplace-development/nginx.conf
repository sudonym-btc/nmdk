    }
  }

  server {
    listen 80;
    listen 443 ssl;
    server_name lnd1.evm.marketplace.test;

    location / {
      proxy_ssl_verify off;
      proxy_ssl_server_name off;
      proxy_pass https://lnd-1:8081;
    }
  }

  server {
    listen 80;
    listen 443 ssl;
    server_name lnd.marketplace.test lnd.evm.marketplace.test marketplace-lnd.evm.marketplace.test;

    location / {
      proxy_ssl_verify off;
      proxy_ssl_server_name off;
      proxy_pass https://marketplace-lnd:8081;
    }
  }

  server {
    listen 80;
    listen 443 ssl;
    server_name lnbits.marketplace.test;

    location / {
      proxy_hide_header Access-Control-Allow-Origin;
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Headers "authorization,content-type,x-requested-with,x-api-key" always;
      add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://lnbits:5000;
    }
  }

  server {
    listen 80;
    listen 443 ssl;
    server_name alby.marketplace.test;

    location / {
      set $albyhub_upstream albyhub:8080;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Credentials;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Max-Age;
      proxy_hide_header Vary;
      add_header Access-Control-Allow-Origin "$http_origin" always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Allow-Headers "authorization,content-type,x-csrf-token,accept,origin" always;
      add_header Access-Control-Allow-Methods "GET,POST,PATCH,DELETE,OPTIONS" always;
      add_header Access-Control-Max-Age 86400 always;
      add_header Vary "Origin" always;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://$albyhub_upstream;
    }
  }

  server {
