worker_processes 1;

events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Proto $scheme;

  ssl_certificate /etc/nginx/certs/marketplace.test.crt;
  ssl_certificate_key /etc/nginx/certs/marketplace.test.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:marketplace_tls:10m;
  ssl_session_timeout 1d;

  server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;
    return 404;
  }

  server {
    listen 80;
    listen 443 ssl;
    server_name marketplace.test;
    default_type text/plain;
    return 200 "marketplace.test proxy\n\nclient: https://ts.client.marketplace.test\nsignet: https://signet.marketplace.test\nblossom: https://blossom.marketplace.test\nrelay: wss://relay.marketplace.test\nlnbits: https://lnbits.marketplace.test\nalby: https://alby.marketplace.test\narbitrum: https://arbitrum.evm.marketplace.test\narbitrum explorer: https://explorer.arbitrum.evm.marketplace.test\nrootstock: https://rootstock.evm.marketplace.test\ncashu mint: https://mint.cashu.marketplace.test\nedge lnd: https://lnd.evm.marketplace.test\n";
  }

  server {
    listen 80;
    listen 443 ssl;
    server_name ts.client.marketplace.test;

    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://host.docker.internal:5178;
    }
  }

  server {
    listen 80;
    listen 443 ssl;
    server_name signet.marketplace.test;

    location / {
      proxy_pass http://signet-ui:4174;
    }
  }

  server {
    listen 80;
    listen 443 ssl;
    server_name signet.api.marketplace.test;

    location / {
      proxy_hide_header Access-Control-Allow-Origin;
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Headers "authorization,content-type,x-requested-with" always;
      add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://signet:3000;
    }
  }

  server {
    listen 80;
    listen 443 ssl;
    server_name blossom.marketplace.test;
    client_max_body_size 50m;

    location / {
      proxy_hide_header Access-Control-Allow-Origin;
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Headers "authorization,content-type,x-requested-with,x-sha-256,x-filename" always;
      add_header Access-Control-Allow-Methods "GET,HEAD,PUT,POST,OPTIONS" always;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_request_buffering off;
      proxy_pass http://blossom:3000;
    }
  }

  server {
    listen 80;
    listen 443 ssl;
    server_name relay.marketplace.test;

    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://cashu-nostr-relay:8080;
    }
  }

  server {
    listen 80;
    listen 443 ssl;
    server_name rootstock.evm.marketplace.test;

    location / {
      proxy_hide_header Access-Control-Allow-Origin;
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Headers "authorization,content-type,x-requested-with" always;
      add_header Access-Control-Allow-Methods "GET,POST,OPTIONS" always;
      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://anvil:8545;
    }
  }

